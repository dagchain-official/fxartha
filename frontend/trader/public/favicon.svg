<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="FXArtha">
  <defs>
    <linearGradient id="fxg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ecc657"/>
      <stop offset="0.55" stop-color="#d6a93d"/>
      <stop offset="1" stop-color="#9b7d3a"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>
  <!-- 8-petal mandala -->
  <g fill="none" stroke="url(#fxg)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="32" cy="32" rx="6.5" ry="15"/>
    <ellipse cx="32" cy="32" rx="6.5" ry="15" transform="rotate(45 32 32)"/>
    <ellipse cx="32" cy="32" rx="6.5" ry="15" transform="rotate(90 32 32)"/>
    <ellipse cx="32" cy="32" rx="6.5" ry="15" transform="rotate(135 32 32)"/>
  </g>
  <!-- Hexagram (Star of David) inside -->
  <g fill="none" stroke="url(#fxg)" stroke-width="1.8" stroke-linejoin="round">
    <polygon points="32,22 40.66,37 23.34,37"/>
    <polygon points="32,42 40.66,27 23.34,27"/>
  </g>
</svg>
